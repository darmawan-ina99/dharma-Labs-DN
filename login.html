<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dapur Nona - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #DC2626, #B91C1C);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-md">
        <!-- Logo -->
        <div class="text-center mb-5">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-2">
                <i class="fas fa-utensils text-2xl text-red-600"></i>
            </div>
            <h1 class="text-xl font-bold text-red-700">DAPUR NONA</h1>
            <p class="text-xs text-gray-500">Multi-User System</p>
        </div>

        <!-- Form Login -->
        <div id="loginForm">
            <div class="mb-3">
                <label class="block text-xs font-bold text-gray-700 mb-1">Email</label>
                <input type="email" id="loginEmail" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
            </div>
            <div class="mb-3">
                <label class="block text-xs font-bold text-gray-700 mb-1">Password</label>
                <input type="password" id="loginPassword" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
            </div>
            <button onclick="doLogin()" class="w-full bg-red-600 text-white py-2 rounded-lg font-bold text-sm hover:bg-red-700 transition">Login</button>
            <p class="text-center text-xs text-gray-500 mt-3">
                Belum punya akun? 
                <a href="#" onclick="showRegister()" class="text-red-600 font-bold">Daftar</a>
            </p>
        </div>

        <!-- Form Register (awalnya tersembunyi) -->
        <div id="registerForm" style="display:none;">
            <div class="mb-3">
                <label class="block text-xs font-bold text-gray-700 mb-1">Email</label>
                <input type="email" id="regEmail" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
            </div>
            <div class="mb-3">
                <label class="block text-xs font-bold text-gray-700 mb-1">Password (min 6 karakter)</label>
                <input type="password" id="regPassword" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 text-sm">
            </div>
            <button onclick="doRegister()" class="w-full bg-yellow-500 text-white py-2 rounded-lg font-bold text-sm hover:bg-yellow-600 transition">Daftar</button>
            <p class="text-center text-xs text-gray-500 mt-3">
                Sudah punya akun? 
                <a href="#" onclick="showLogin()" class="text-red-600 font-bold">Login</a>
            </p>
        </div>

        <!-- Pesan status -->
        <div id="message" class="mt-3 text-center text-xs font-bold"></div>
    </div>

    <!-- Firebase SDK (versi modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔴 Konfigurasi Firebase dari proyek Anda (sudah diisi, tidak perlu ganti) 🔴
        const firebaseConfig = {
            apiKey: "AIzaSyA07nm6AuNKeqF20Q4TS15eK2tuTnC8WwU",
            authDomain: "siti-ju.firebaseapp.com",
            projectId: "siti-ju",
            storageBucket: "siti-ju.firebasestorage.app",
            messagingSenderId: "786109136745",
            appId: "1:786109136745:web:c88bd7fe52d033b66547f8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        // Kirim fungsi ke global scope (agar bisa dipanggil dari onclick)
        window.doLogin = async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const msg = document.getElementById('message');
            
            if (!email || !password) {
                msg.innerHTML = '❌ Email dan password harus diisi';
                msg.classList.add('text-red-600');
                return;
            }
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                msg.innerHTML = '✅ Login berhasil! Mengalihkan...';
                msg.classList.remove('text-red-600');
                msg.classList.add('text-green-600');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);
            } catch (error) {
                let pesan = error.message;
                if (pesan.includes('user-not-found')) pesan = 'Email tidak terdaftar';
                if (pesan.includes('wrong-password')) pesan = 'Password salah';
                msg.innerHTML = '❌ ' + pesan;
                msg.classList.add('text-red-600');
            }
        };

        window.doRegister = async () => {
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const msg = document.getElementById('message');
            
            if (!email || !password) {
                msg.innerHTML = '❌ Email dan password harus diisi';
                msg.classList.add('text-red-600');
                return;
            }
            
            if (password.length < 6) {
                msg.innerHTML = '❌ Password minimal 6 karakter';
                msg.classList.add('text-red-600');
                return;
            }
            
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                msg.innerHTML = '✅ Pendaftaran berhasil! Silakan login.';
                msg.classList.remove('text-red-600');
                msg.classList.add('text-green-600');
                setTimeout(() => {
                    showLogin();
                    document.getElementById('loginEmail').value = email;
                }, 1500);
            } catch (error) {
                let pesan = error.message;
                if (pesan.includes('email-already-in-use')) pesan = 'Email sudah terdaftar';
                msg.innerHTML = '❌ ' + pesan;
                msg.classList.add('text-red-600');
            }
        };

        window.showRegister = () => {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('message').innerHTML = '';
        };

        window.showLogin = () => {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('message').innerHTML = '';
        };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
